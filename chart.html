<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="margin:0;background-color:#d0e8ff;font-family:Arial; color: #36a2eb;">
    <h1 style="display:flex;justify-content:center;align-items:center;">Dashboard de Temperatura e Umidade</h1>
    
    <div style="background-color:#d6f2fa;padding:20px;display:flex;gap:40px;justify-content:center;align-items:center;height:78vh;">
        <div style="width:500px;">
            <canvas id="myChart"></canvas>
        </div>
        <div style="width:500px;">
            <canvas id="myChart2"></canvas>
        </div>
    </div>
</body>
<script>
    const labelsLinha = ['12:00','13:00','14:00','15:00','16:00','17:00'];

    const dataLinha = {
        labels: labelsLinha,
        datasets: [
            {
                label: 'Temperatura',
                data: [30,29,28,25,22,23],
                borderColor: '#ff6384',
                backgroundColor: '#ff6384',
                tension: 0.3
            },
            {
                label: 'Umidade',
                data: [80,82,80,85,85,83],
                borderColor: '#36a2eb',
                backgroundColor: '#36a2eb',
                tension: 0.3
            }
        ]
    };

    const config = {
        type: 'line',
        data: dataLinha,
        options: {
            plugins: {
                legend: {
                    position: 'top'
                }
            }
        }
    };

    const labelsBarra = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho'];

    const dataBarra = {
        labels: labelsBarra,
        datasets: [
            {
                label: 'Temperatura Média',
                data: [22,24,27,23,20,18],
                backgroundColor: '#ff6384'
            },
            {
                label: 'Umidade Média',
                data: [90,89,93,87,88,82],
                backgroundColor: '#36a2eb'
            }
        ]
    };

    const config2 = {
        type: 'bar',
        data: dataBarra,
        options: {
            plugins: {
                legend: {
                    position: 'top'
                }
            }
        }
    };

    new Chart(document.getElementById('myChart'), config);
    new Chart(document.getElementById('myChart2'), config2);
</script>
</html>
